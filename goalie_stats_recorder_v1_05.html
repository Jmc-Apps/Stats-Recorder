<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Goalie Stats Recorder v1.05</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#141414">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<style>
:root{--bg:#141414;--panel:#242424;--card:#333;--accent:#9e9e9e;--good:#2fd17c;--bad:#ef5350;--warn:#ffca28;--text:#f4f4f4;--muted:#bbb;--line:#555;--input:#1a1a1a}
*{box-sizing:border-box}body{margin:0;background:#141414;color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}header{position:sticky;top:0;z-index:5;background:#1f1f1fee;border-bottom:1px solid var(--line);padding:10px;text-align:center}header img{max-width:min(520px,94vw);height:auto}main{padding:12px;max-width:720px;margin:auto}.card{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:14px;margin:10px 0}h1,h2{margin:4px 0 10px}label{display:block;font-size:12px;color:var(--muted);margin:10px 0 5px}input,select,textarea{width:100%;border:1px solid #666;border-radius:12px;padding:12px;background:var(--input);color:var(--text);font-size:16px}textarea{min-height:60px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}.btn{width:100%;border:0;border-radius:14px;padding:14px;margin-top:9px;background:var(--accent);color:#06111f;font-weight:900;font-size:16px}.btn.good{background:var(--good)}.btn.danger{background:var(--bad);color:white}.chips{display:flex;flex-wrap:wrap;gap:8px}.chip{border:1px solid #666;background:#2a2a2a;color:var(--text);border-radius:999px;padding:11px 13px;font-weight:800}.chip.on{background:var(--accent);color:#06111f}.big3{display:grid;grid-template-columns:1fr;gap:8px}.big3 .chip{font-size:20px;text-align:center;border-radius:18px;padding:16px}.mapBox{background:#eee;border-radius:14px;overflow:hidden;border:1px solid #777}svg{width:100%;height:auto;display:block;touch-action:manipulation}.small,.muted{font-size:12px;color:var(--muted)}.countrow{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.stat{background:#222;border:1px solid var(--line);border-radius:14px;padding:10px;text-align:center}.stat b{font-size:24px;display:block}@media(min-width:600px){.big3{grid-template-columns:repeat(3,1fr)}}

.recFooter{margin:18px auto 8px;padding:12px;text-align:center;color:#bbb;font-size:12px;border-top:1px solid #555;max-width:720px}
.recFooter b{color:#f4f4f4}

</style>
</head>
<body>
<header><img src="assets/title-logo.png" alt="Goalie Stats Recorder"></header>
<main>
<section class="card">
<h1>Goalie Stats Recorder</h1>

<div class="grid2"><div><label>Goalie Name</label><input id="goalieName"></div><div><label>Date</label><input id="matchDate" type="date"></div></div>
<div class="grid2"><div><label>Home Team</label><input id="homeTeam"></div><div><label>Opponent</label><input id="opponentTeam"></div></div>
<div class="grid2"><div><label>Home Goals</label><input id="homeGoals" type="number" min="0" value="0"></div><div><label>Mode</label><select id="recordMode"><option value="quick">Quick - no heat map</option><option value="heat">Detailed - with heat map</option></select></div></div>
<button class="btn good" onclick="startMatch()">Start / Update Match</button>
<div id="matchStatus" class="small"></div>
</section>


<section class="card"><h2>Import Goalies & Teams</h2>
<input type="file" id="masterFile" accept=".json">
<button class="btn good" onclick="importMasterData()">Import Goalies & Teams</button>
</section>
<section class="card">
<h2>Record Shot</h2>
<label>Outcome</label><div id="outcomeButtons" class="chips big3"></div>
<label>Primary Shot Category</label><div id="primaryButtons" class="chips"></div>
<label>Shot Situation</label><div id="situationButtons" class="chips"></div>
<label>Out Numbered</label><div id="outnumberedButtons" class="chips"></div>
<label>Rebound Result</label><div id="reboundButtons" class="chips"></div>
<label>Notes</label><input id="shotNote">
<div id="heatMaps">
<div class="grid2"><div><h2>D Map</h2><div id="dMap" class="mapBox"></div></div><div><h2>Goal Box</h2><div id="gMap" class="mapBox"></div><label><input id="mirrorGoal" type="checkbox" style="width:auto"> Mirror goal box</label></div></div>
</div>
<button class="btn good" onclick="saveShot()">Save Shot</button>
<div id="shotStatus" class="small"></div>
</section>

<section class="card">
<h2>Match Summary</h2>
<div class="countrow"><div class="stat"><b id="saveCount">0</b><span>Saves</span></div><div class="stat"><b id="goalCount">0</b><span>Goals</span></div><div class="stat"><b id="angleCount">0</b><span>Angles</span></div></div>
<button class="btn" onclick="undoLast()">Undo Last Shot</button>
</section>

<section class="card">
<h2>Coaching Ratings</h2>
<label>Positioning</label><input id="ratingPositioning" type="range" min="1" max="5" value="3">
<label>Communication</label><input id="ratingCommunication" type="range" min="1" max="5" value="3">
<label>Rebound Control</label><input id="ratingRebound" type="range" min="1" max="5" value="3">
<label>Decision Making</label><input id="ratingDecision" type="range" min="1" max="5" value="3">
<button class="btn good" onclick="exportMatch()">Export Match JSON</button>
<button class="btn danger" onclick="clearMatch()">Clear Recorder</button>
<div id="exportStatus" class="small"></div>
</section>
</main>

<footer class="recFooter" id="recorderFooter">
  <b>Goalie Stats Recorder v1.05</b><br>
  Compatible with Hockey Goalie Stats v4.02
</footer>

<script>
const STORE='goalieStatsRecorderV1';
let state=loadState();
const outcomes=['Save','Goal','Angle Closed Off'];
const primary=['1st Shot','Rebound'];
const situations=['None','Penalty Corner','Penalty Stroke','In Game 1v1','8 Second 1v1','Own Goal','Other'];
const outs=['Not Out Numbered','2 vs 1','3 vs 1','4+ vs 1'];
const rebounds=['No rebound','Safe','Dangerous'];
let selectedOutcome='Save', selectedPrimary='1st Shot', selectedSituation='None', selectedOut='Not Out Numbered', selectedRebound='No rebound';
let tapD=null,tapG=null;
function uid(){return 'id_'+Math.random().toString(36).slice(2)+Date.now().toString(36)}
function today(){return new Date().toISOString().slice(0,10)}
function loadState(){try{return JSON.parse(localStorage.getItem(STORE))||{shots:[]}}catch(e){return {shots:[]}}}
function saveState(){localStorage.setItem(STORE,JSON.stringify(state))}
function esc(s){return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function buttonGroup(id,items,selected,fn){document.getElementById(id).innerHTML=items.map(x=>`<button class="chip ${x===selected?'on':''}" onclick="${fn}('${String(x).replaceAll("'","\\'")}')">${esc(x)}</button>`).join('')}
function selectOutcome(x){selectedOutcome=x;if(x==='Angle Closed Off')tapG=null;render()}
function selectPrimary(x){selectedPrimary=x;render()} function selectSituation(x){selectedSituation=x;render()} function selectOut(x){selectedOut=x;render()} function selectRebound(x){selectedRebound=x;render()}
function ptColor(o){return o==='Goal'?'#ef5350':o==='Angle Closed Off'?'#ffca28':'#2fd17c'}
function handleSvgClick(ev,svg,cb){const r=svg.getBoundingClientRect(),vb=svg.getAttribute('viewBox').split(' ').map(Number);cb({x:+(((ev.clientX-r.left)/r.width*vb[2]).toFixed(1)),y:+(((ev.clientY-r.top)/r.height*vb[3]).toFixed(1))})}
function basePitch(points=[],cb=null,sel=null){const id='svg_'+uid();const pts=points.filter(p=>p.dX!==undefined).map(p=>`<circle cx="${p.dX}" cy="${p.dY}" r="3.3" fill="${ptColor(p.outcome)}" stroke="#111" stroke-width=".35"></circle>`).join('');const s=sel?`<circle cx="${sel.x}" cy="${sel.y}" r="5.4" fill="none" stroke="#111" stroke-width="1.8"></circle>`:'';setTimeout(()=>{const svg=document.getElementById(id);if(svg&&cb)svg.onclick=ev=>handleSvgClick(ev,svg,cb)},0);return `<svg id="${id}" viewBox="0 0 100 62.5"><rect width="100" height="62.5" fill="#f2f2f2"/><image href="./assets/d.svg" x="0" y="0" width="100" height="62.5" preserveAspectRatio="xMidYMid meet"></image>${pts}${s}</svg>`}
function baseGoal(points=[],cb=null,sel=null){const id='svg_'+uid();const pts=points.filter(p=>p.outcome!=='Angle Closed Off'&&p.gX!==undefined).map(p=>`<circle cx="${p.gX}" cy="${p.gY}" r="3.3" fill="${ptColor(p.outcome)}" stroke="#111" stroke-width=".35"></circle>`).join('');const s=sel?`<circle cx="${sel.x}" cy="${sel.y}" r="5.4" fill="none" stroke="#111" stroke-width="1.8"></circle>`:'';setTimeout(()=>{const svg=document.getElementById(id);if(svg&&cb)svg.onclick=ev=>handleSvgClick(ev,svg,cb)},0);return `<svg id="${id}" viewBox="0 0 100 56.25"><rect width="100" height="56.25" fill="#f2f2f2"/><image href="./assets/box.svg" x="0" y="0" width="100" height="56.25" preserveAspectRatio="xMidYMid meet"></image>${pts}${s}</svg>`}
function startMatch(){state.goalieName=goalieName.value.trim();state.date=matchDate.value||today();state.homeTeam=homeTeam.value.trim();state.opponentTeam=opponentTeam.value.trim();state.homeGoals=Number(homeGoals.value||0);saveState();render();matchStatus.textContent='Match ready.'}
function saveShot(){if(!state.goalieName){alert('Enter goalie and start/update match first.');return}const heat=recordMode.value==='heat'; if(heat&&!tapD){alert('Tap D map or switch to Quick mode.');return} if(heat&&selectedOutcome!=='Angle Closed Off'&&!tapG){alert('Tap goal box or switch to Quick mode.');return}let shot={id:uid(),type:selectedPrimary,shotCategory:selectedPrimary,shotSituation:selectedSituation==='None'?'':selectedSituation,outcome:selectedOutcome,outnumbered:selectedOut,rebound:selectedRebound==='No rebound'?'':selectedRebound,note:shotNote.value,time:new Date().toISOString()}; if(heat){shot.dX=tapD.x;shot.dY=tapD.y;if(selectedOutcome!=='Angle Closed Off'){let gx=tapG.x;if(mirrorGoal.checked)gx=100-gx;shot.gX=gx;shot.gY=tapG.y}} state.shots=state.shots||[];state.shots.push(shot);tapD=null;tapG=null;shotNote.value='';saveState();render();shotStatus.textContent='Shot saved.'}
function undoLast(){if((state.shots||[]).length){state.shots.pop();saveState();render()}}
function counts(){return {s:(state.shots||[]).filter(x=>x.outcome==='Save').length,g:(state.shots||[]).filter(x=>x.outcome==='Goal').length,a:(state.shots||[]).filter(x=>x.outcome==='Angle Closed Off').length}}
function ratings(){return {Positioning:Number(ratingPositioning.value),Communication:Number(ratingCommunication.value),'Rebound Control':Number(ratingRebound.value),'Decision Making':Number(ratingDecision.value)}}
function stamp(){const d=new Date();const p=n=>String(n).padStart(2,'0');return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}_${p(d.getHours())}-${p(d.getMinutes())}`}
function exportMatch(){startMatch();const payload={sourceApp:'Goalie Stats Recorder',sourceVersion:'1.0',targetApp:'Hockey Goalie Stats',targetMajorVersion:'3',exportedAt:new Date().toISOString(),match:{goalieName:state.goalieName,date:state.date,homeTeam:state.homeTeam,opponentTeam:state.opponentTeam,homeGoals:Number(state.homeGoals||0),shots:state.shots||[],ratings:ratings()}};const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='goalie_match_import_'+stamp()+'.json';a.click();URL.revokeObjectURL(a.href);exportStatus.textContent='Match exported.'}
function clearMatch(){if(confirm('Clear recorder data?')){state={shots:[]};saveState();render()}}
function render(){goalieName.value=state.goalieName||goalieName.value||'';matchDate.value=state.date||matchDate.value||today();homeTeam.value=state.homeTeam||homeTeam.value||'';opponentTeam.value=state.opponentTeam||opponentTeam.value||'';homeGoals.value=state.homeGoals??homeGoals.value??0;buttonGroup('outcomeButtons',outcomes,selectedOutcome,'selectOutcome');buttonGroup('primaryButtons',primary,selectedPrimary,'selectPrimary');buttonGroup('situationButtons',situations,selectedSituation,'selectSituation');buttonGroup('outnumberedButtons',outs,selectedOut,'selectOut');buttonGroup('reboundButtons',rebounds,selectedRebound,'selectRebound');const heat=recordMode.value==='heat';heatMaps.style.display=heat?'block':'none';dMap.innerHTML=basePitch(state.shots||[],p=>{tapD=p;render()},tapD);gMap.innerHTML=baseGoal(state.shots||[],p=>{if(selectedOutcome==='Angle Closed Off'){tapG=null;render();return}tapG=p;render()},tapG);const c=counts();saveCount.textContent=c.s;goalCount.textContent=c.g;angleCount.textContent=c.a}
matchDate.value=today();render();
</script>
<script>
if('serviceWorker' in navigator && location.protocol !== 'file:'){window.addEventListener('load',()=>navigator.serviceWorker.register('./service-worker.js').catch(console.warn));}
</script>

<script>
let masterData=JSON.parse(localStorage.getItem('goalieMasterData')||'null');
function importMasterData(){
 const f=document.getElementById('masterFile').files[0]; if(!f)return;
 const r=new FileReader(); r.onload=()=>{masterData=JSON.parse(r.result); localStorage.setItem('goalieMasterData',JSON.stringify(masterData)); alert('Imported '+(masterData.goalies||[]).length+' goalies'); renderMasterSelectors();}; r.readAsText(f);
}
function renderMasterSelectors(){
 if(!masterData||!masterData.goalies)return;
 let g=document.getElementById('goalieSelect');
 if(!g){
  const target=document.getElementById('goalieName');
  target.insertAdjacentHTML('beforebegin','<label>Goalie</label><select id="goalieSelect"></select><label>Team</label><select id="teamSelect"></select>');
  g=document.getElementById('goalieSelect');
  g.onchange=updateTeams;
 }
 g.innerHTML=masterData.goalies.map((x,i)=>`<option value="${i}">${x.name}</option>`).join('');
 updateTeams();
}
function updateTeams(){
 const idx=document.getElementById('goalieSelect').value||0;
 const goalie=masterData.goalies[idx];
 document.getElementById('goalieName').value=goalie.name;
 const t=document.getElementById('teamSelect');
 t.innerHTML=(goalie.teams||[]).map(x=>`<option>${x}</option>`).join('');
 if(t.options.length) document.getElementById('homeTeam').value=t.value;
 t.onchange=()=>document.getElementById('homeTeam').value=t.value;
}
setTimeout(renderMasterSelectors,100);
</script>
<style>
.recTabs{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0}
.recTab{border:1px solid #666;background:#2a2a2a;color:#fff;border-radius:999px;padding:10px 12px;font-weight:800}
.recTab.on{background:#9e9e9e;color:#06111f}
.recPanel{display:none}
.recPanel.active{display:block}

.recFooter{margin:18px auto 8px;padding:12px;text-align:center;color:#bbb;font-size:12px;border-top:1px solid #555;max-width:720px}
.recFooter b{color:#f4f4f4}

</style>
<script>
/* v1.05: dedicated Import Goalies tab and consistent versioning */
(function(){
  window.RECORDER_VERSION = "1.05";

  function showRecTab(id){
    document.querySelectorAll(".recPanel").forEach(p => p.classList.remove("active"));
    document.querySelectorAll(".recTab").forEach(b => b.classList.remove("on"));
    const panel = document.getElementById(id);
    if(panel) panel.classList.add("active");
    const btn = document.querySelector('[data-rec-tab="' + id + '"]');
    if(btn) btn.classList.add("on");
  }
  window.showRecTab = showRecTab;

  function getMasterData(){
    try { return JSON.parse(localStorage.getItem("goalieStatsRecorderMasterData") || "null"); }
    catch(e) { return null; }
  }

  function setMasterData(data){
    localStorage.setItem("goalieStatsRecorderMasterData", JSON.stringify(data));
  }

  window.importGoaliesTeams = function(){
    const input = document.getElementById("masterDataFile");
    const status = document.getElementById("masterDataStatus");
    const file = input && input.files ? input.files[0] : null;
    if(!file) { alert("Choose a master data JSON file first."); return; }
    const reader = new FileReader();
    reader.onload = function(){
      try {
        const data = JSON.parse(reader.result);
        if(data.exportType && data.exportType !== "MasterData") throw new Error("This is not a MasterData export.");
        if(!Array.isArray(data.goalies)) throw new Error("No goalies found in file.");
        data.importedAt = new Date().toISOString();
        setMasterData(data);
        populateGoalieTeamDropdowns();
        updateMasterStatus();
        if(status) status.textContent = "Imported " + data.goalies.length + " goalies.";
        alert("Goalies & Teams imported.");
      } catch(e) {
        if(status) status.textContent = "Import failed: " + e.message;
        alert("Import failed: " + e.message);
      }
    };
    reader.readAsText(file);
  };

  window.populateGoalieTeamDropdowns = function(){
    const data = getMasterData();
    const goalieSelect = document.getElementById("goalieSelect");
    const teamSelect = document.getElementById("teamSelect");
    if(!data || !Array.isArray(data.goalies)) return;

    if(goalieSelect){
      const current = goalieSelect.value;
      goalieSelect.innerHTML = data.goalies.map((g,i) => `<option value="${i}">${g.name || "Goalie " + (i+1)}</option>`).join("");
      if(current) goalieSelect.value = current;
    }

    const selectedGoalie = data.goalies[Number(goalieSelect ? goalieSelect.value : 0)] || data.goalies[0];
    if(teamSelect){
      const teams = selectedGoalie && Array.isArray(selectedGoalie.teams) ? selectedGoalie.teams : [];
      teamSelect.innerHTML = teams.length ? teams.map(t => `<option value="${t}">${t}</option>`).join("") : `<option value="">No teams listed</option>`;
    }

    if(selectedGoalie){
      const nameInput = document.getElementById("goalieName");
      if(nameInput) nameInput.value = selectedGoalie.name || "";
      const homeInput = document.getElementById("homeTeam");
      if(homeInput && teamSelect && teamSelect.value) homeInput.value = teamSelect.value;
    }
  };

  window.updateMasterStatus = function(){
    const box = document.getElementById("masterDataLoadedStatus");
    if(!box) return;
    const data = getMasterData();
    if(!data || !Array.isArray(data.goalies)){
      box.innerHTML = "<b>Master Data:</b> Not Loaded";
      return;
    }
    let teamCount = 0;
    data.goalies.forEach(g => teamCount += Array.isArray(g.teams) ? g.teams.length : 0);
    box.innerHTML = `<b>Master Data:</b> Loaded<br>Goalies: ${data.goalies.length}<br>Teams: ${teamCount}<br>Imported: ${data.importedAt ? new Date(data.importedAt).toLocaleString() : ""}`;
  };

  function installRecorderTabs(){
    if(document.getElementById("recTabBar")) return;
    const main = document.querySelector("main") || document.body;
    const tabbar = document.createElement("div");
    tabbar.id = "recTabBar";
    tabbar.className = "recTabs";
    tabbar.innerHTML = `
      <button class="recTab on" data-rec-tab="recMatchPanel" onclick="showRecTab('recMatchPanel')">Match</button>
      <button class="recTab" data-rec-tab="recImportPanel" onclick="showRecTab('recImportPanel')">Import Goalies</button>
    `;
    main.insertBefore(tabbar, main.firstChild);

    const existing = Array.from(main.children).filter(el => el.id !== "recTabBar");
    const matchPanel = document.createElement("div");
    matchPanel.id = "recMatchPanel";
    matchPanel.className = "recPanel active";
    existing.forEach(el => matchPanel.appendChild(el));
    main.appendChild(matchPanel);

    const importPanel = document.createElement("div");
    importPanel.id = "recImportPanel";
    importPanel.className = "recPanel";
    importPanel.innerHTML = `
      <section class="card">
        <h2>Import Goalies & Teams</h2>
        <p class="muted">Import master data exported from Hockey Goalie Stats.</p>
        <div id="masterDataLoadedStatus" class="small"></div>
        <label>Master Data JSON</label>
        <input type="file" id="masterDataFile" accept="application/json,.json">
        <button class="btn good" onclick="importGoaliesTeams()">Import Goalies & Teams</button>
        <div id="masterDataStatus" class="small"></div>
      </section>
    `;
    main.appendChild(importPanel);
  }

  function installGoalieTeamSelectors(){
    if(document.getElementById("goalieSelect")) return;
    const goalieInput = document.getElementById("goalieName");
    if(!goalieInput) return;

    const wrap = document.createElement("div");
    wrap.innerHTML = `
      <label>Imported Goalie</label>
      <select id="goalieSelect" onchange="populateGoalieTeamDropdowns()"></select>
      <label>Imported Team</label>
      <select id="teamSelect" onchange="var h=document.getElementById('homeTeam'); if(h) h.value=this.value;"></select>
      <div class="small">Use the Import Goalies tab to load this list.</div>
    `;
    goalieInput.parentNode.insertBefore(wrap, goalieInput);
  }

  function updateVersionText(){
    document.querySelectorAll("*").forEach(el => {
      if(el.children.length === 0 && /v1\.\d+|Version\s+1\.\d+/i.test(el.textContent || "")){
        el.textContent = el.textContent.replace(/v1\.\d+/i, "v1.05").replace(/Version\s+1\.\d+/i, "Version 1.05");
      }
    });
  }

  const oldExportMatch = window.exportMatch;
  if(typeof oldExportMatch === "function"){
    window.exportMatch = function(){
      try {
        if(typeof state !== "undefined") state.sourceVersion = "1.02";
      } catch(e) {}
      oldExportMatch();
    };
  }

  setTimeout(function(){
    installRecorderTabs();
    installGoalieTeamSelectors();
    populateGoalieTeamDropdowns();
    updateMasterStatus();
    updateVersionText();
  },0);
})();
</script>


<script>
/* v1.05: remove Import Goalies controls from Match/Home tab */
(function(){
  window.RECORDER_VERSION = "1.05";

  function isImportRelated(el){
    if(!el) return false;
    const txt = (el.textContent || "").toLowerCase();
    const html = (el.innerHTML || "").toLowerCase();
    return (
      txt.includes("import goalies") ||
      txt.includes("import goalies & teams") ||
      txt.includes("master data json") ||
      txt.includes("choose master data") ||
      txt.includes("master data loaded") ||
      html.includes("masterdatafile") ||
      html.includes("importgoaliesteams") ||
      html.includes("masterdatastatus") ||
      html.includes("masterdataloadedstatus")
    );
  }

  function removeImportControlsFromMatchTab(){
    const matchPanel = document.getElementById("recMatchPanel") || document.querySelector(".recPanel.active") || document.querySelector("main");
    const importPanel = document.getElementById("recImportPanel");
    if(!matchPanel) return;

    // Remove full import cards/sections accidentally left in Match tab.
    Array.from(matchPanel.querySelectorAll(".card, section, div")).forEach(el => {
      if(importPanel && importPanel.contains(el)) return;
      if(el.id === "recTabBar") return;
      if(el.id === "recImportPanel") return;
      if(el.id === "recMatchPanel") return;
      if(isImportRelated(el)){
        // Do not remove goalie/team selectors used for recording.
        if(el.querySelector && (el.querySelector("#goalieSelect") || el.querySelector("#teamSelect"))) return;
        el.remove();
      }
    });

    // Remove individual inputs/buttons if still present.
    Array.from(matchPanel.querySelectorAll("input, button, label, .small, p")).forEach(el => {
      if(importPanel && importPanel.contains(el)) return;
      const id = el.id || "";
      const txt = (el.textContent || "").toLowerCase();
      if(
        id === "masterDataFile" ||
        id === "masterDataStatus" ||
        id === "masterDataLoadedStatus" ||
        (el.getAttribute("onclick") || "").includes("importGoaliesTeams") ||
        txt.includes("import goalies") ||
        txt.includes("master data json") ||
        txt.includes("choose master data")
      ){
        el.remove();
      }
    });
  }

  function ensureImportTabOnly(){
    const importPanel = document.getElementById("recImportPanel");
    if(importPanel && !importPanel.querySelector("#masterDataFile")){
      importPanel.innerHTML = `
        <section class="card">
          <h2>Import Goalies & Teams</h2>
          <p class="muted">Import master data exported from Hockey Goalie Stats.</p>
          <div id="masterDataLoadedStatus" class="small"></div>
          <label>Master Data JSON</label>
          <input type="file" id="masterDataFile" accept="application/json,.json">
          <button class="btn good" onclick="importGoaliesTeams()">Import Goalies & Teams</button>
          <div id="masterDataStatus" class="small"></div>
        </section>
      `;
    }
  }

  const oldShowRecTab = window.showRecTab;
  if(typeof oldShowRecTab === "function"){
    window.showRecTab = function(id){
      oldShowRecTab(id);
      setTimeout(function(){
        ensureImportTabOnly();
        removeImportControlsFromMatchTab();
        if(typeof updateMasterStatus === "function") updateMasterStatus();
      },0);
    };
  }

  const oldRender = window.render;
  if(typeof oldRender === "function" && !window.__v103RenderWrapped){
    window.render = function(){
      oldRender();
      removeImportControlsFromMatchTab();
    };
    window.__v103RenderWrapped = true;
  }

  setTimeout(function(){
    ensureImportTabOnly();
    removeImportControlsFromMatchTab();
    if(typeof updateMasterStatus === "function") updateMasterStatus();
  },0);
})();
</script>


<script>
/* v1.05: forward-compatible Hockey Goalie Stats master-data imports */
(function(){
  window.RECORDER_VERSION = "1.05";
  window.SUPPORTED_MAIN_APP_MAJOR_VERSION = "4";

  function isValidMasterDataExport(data){
    if(!data || typeof data !== "object") return false;
    if(data.sourceApp && data.sourceApp !== "Hockey Goalie Stats") return false;
    if(data.exportType && data.exportType !== "MasterData") return false;
    if(!Array.isArray(data.goalies)) return false;
    return true;
  }

  function getMainAppVersionLabel(data){
    return data && data.sourceVersion ? String(data.sourceVersion) : "Unknown";
  }

  // Replace importGoaliesTeams with a less brittle version check.
  window.importGoaliesTeams = function(){
    const input = document.getElementById("masterDataFile");
    const status = document.getElementById("masterDataStatus");
    const file = input && input.files ? input.files[0] : null;

    if(!file){
      alert("Choose a Hockey Goalie Stats master-data JSON file first.");
      return;
    }

    const reader = new FileReader();
    reader.onload = function(){
      try{
        const data = JSON.parse(reader.result);

        if(!isValidMasterDataExport(data)){
          throw new Error("This is not a valid Hockey Goalie Stats MasterData export.");
        }

        data.importedAt = new Date().toISOString();
        data.importedInto = "Goalie Stats Recorder";
        data.importedIntoVersion = "1.04";

        localStorage.setItem("goalieStatsRecorderMasterData", JSON.stringify(data));

        if(typeof populateGoalieTeamDropdowns === "function") populateGoalieTeamDropdowns();
        if(typeof updateMasterStatus === "function") updateMasterStatus();

        const msg = "Imported " + data.goalies.length + " goalies from Hockey Goalie Stats v" + getMainAppVersionLabel(data) + ".";
        if(status) status.textContent = msg;
        alert(msg);
      }catch(e){
        if(status) status.textContent = "Import failed: " + e.message;
        alert("Import failed: " + e.message);
      }
    };

    reader.readAsText(file);
  };

  const oldUpdateMasterStatus = window.updateMasterStatus;
  window.updateMasterStatus = function(){
    const box = document.getElementById("masterDataLoadedStatus");
    if(!box){
      if(typeof oldUpdateMasterStatus === "function") oldUpdateMasterStatus();
      return;
    }

    let data = null;
    try{
      data = JSON.parse(localStorage.getItem("goalieStatsRecorderMasterData") || "null");
    }catch(e){}

    if(!data || !Array.isArray(data.goalies)){
      box.innerHTML = "<b>Master Data:</b> Not Loaded";
      return;
    }

    let teamCount = 0;
    data.goalies.forEach(g => teamCount += Array.isArray(g.teams) ? g.teams.length : 0);

    box.innerHTML =
      "<b>Master Data:</b> Loaded<br>" +
      "Source: Hockey Goalie Stats v" + getMainAppVersionLabel(data) + "<br>" +
      "Goalies: " + data.goalies.length + "<br>" +
      "Teams: " + teamCount + "<br>" +
      "Imported: " + (data.importedAt ? new Date(data.importedAt).toLocaleString() : "");
  };

  setTimeout(function(){
    document.querySelectorAll("*").forEach(el => {
      if(el.children.length === 0 && /v1\.\d+|Version\s+1\.\d+/i.test(el.textContent || "")){
        el.textContent = el.textContent
          .replace(/v1\.\d+/i, "v1.05")
          .replace(/Version\s+1\.\d+/i, "Version 1.05");
      }
    });
    if(typeof updateMasterStatus === "function") updateMasterStatus();
  },0);
})();
</script>


<script>
/* v1.05: footer version/compatibility display */
(function(){
  window.RECORDER_VERSION = "1.05";
  window.HOCKEY_STATS_VERSION = "4.02";

  function removeTopCompatibilityText(){
    document.querySelectorAll("*").forEach(el => {
      if(el.children.length === 0){
        const txt = (el.textContent || "").trim();
        if(/^Companion\s+app\s+v1\.\d+\s*•\s*Exports\s+to\s+Hockey\s+Goalie\s+Stats\s+v\d+(\.\d+)?$/i.test(txt)){
          el.remove();
        }
      }
    });
  }

  function updateFooter(){
    let f = document.getElementById("recorderFooter");
    if(!f){
      f = document.createElement("footer");
      f.id = "recorderFooter";
      f.className = "recFooter";
      document.body.appendChild(f);
    }
    f.innerHTML = "<b>Goalie Stats Recorder v1.05</b><br>Compatible with Hockey Goalie Stats v4.02";
  }

  setTimeout(function(){
    removeTopCompatibilityText();
    updateFooter();
  },0);
})();
</script>
